[weather]
address = "Kirkland, WA"
unit = "imperial"

[widget.clock]
color = "secondary"
format = "{:%a %I:%M %p}"
scale = 1.2000000000000002

[widget.notifications]
hide_when_no_unread = true

[widget.tray]
drawer = true

[widget.workspaces]
hide_when_empty = true
