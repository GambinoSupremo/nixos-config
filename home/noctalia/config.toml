[bar.default]
background_opacity = 0.97999997809529305
border = "secondary"
capsule = true
center = [ "clock", "media" ]
color = "primary"
end = [ "tray", "notifications", "clipboard", "volume", "control-center", "session" ]
font_weight = 400
margin_edge = 0.0
margin_ends = 0.0
radius = 0
scale = 0.90000000596046448
thickness = 32

[config]

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "caffeine"

[[control_center.shortcuts]]
type = "nightlight"

[[control_center.shortcuts]]
type = "notification"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-4", "lockscreen-login-box@DP-3" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-3"]
    box_height = 0.0
    box_width = 0.0
    cx = 1920.0
    cy = 2037.0
    output = "DP-3"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-3".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-4"]
    box_height = 0.0
    box_width = 0.0
    cx = 1720.0
    cy = 1317.0
    output = "DP-4"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-4".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[osd]
background_opacity = 0.89999997988343239
offset_x = 8.0
scale = 0.85000000521540642

[shell]
avatar_path = "/home/gav/Downloads/p.kagi.jpg"
settings_show_advanced = true
telemetry_enabled = false

    [shell.panel]
    open_near_click_control_center = true
    open_near_click_session = true
    open_near_click_wallpaper = true

[templates.vivaldi]
input_path = "~/.config/noctalia/templates/vivaldi.css"
output_path = "~/.cache/noctalia/vivaldi/vivaldi.css"

[theme]
