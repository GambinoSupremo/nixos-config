[wallpaper]
directory = "/home/gav/Pictures/backgrounds"

    [wallpaper.automation]
    enabled = true
    interval_minutes = 55

    [wallpaper.default]
    path = "/home/gav/Pictures/backgrounds/monochrome/a_black_and_white_building_with_a_fire_escape.jpg"

    [wallpaper.last]
    path = "/home/gav/Pictures/backgrounds/monochrome/a_black_and_white_building_with_a_fire_escape.jpg"

    [wallpaper.monitors.DP-1]
    path = "/home/gav/Pictures/backgrounds/abstract/a_painting_of_a_man_with_a_dripping_face.jpg"

    [wallpaper.monitors.DP-2]
    path = "/home/gav/Pictures/backgrounds/abstract/a_painting_of_a_man_with_a_dripping_face.jpg"

    [wallpaper.monitors.DP-3]
    path = "/home/gav/Pictures/backgrounds/monochrome/a_black_and_white_building_with_a_fire_escape.jpg"

    [wallpaper.monitors.DP-4]
    path = "/home/gav/Pictures/backgrounds/monochrome/a_black_and_white_building_with_a_fire_escape.jpg"

    [wallpaper.monitors.WAYLAND-1]
